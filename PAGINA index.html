<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMERFFZ - Mis Redes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle, #151522 0%, #0a0a0f 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            padding: 45px 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .logo-area {
            margin-bottom: 35px;
        }

        .logo-area h1 {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 3px;
            color: #ff3333;
            text-shadow: 0 0 20px rgba(255, 51, 51, 0.6);
            margin-bottom: 8px;
        }

        .logo-area p {
            color: #a0a0b5;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn-link {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 20px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Discord */
        .discord {
            background: #5865F2;
            color: #ffffff;
        }

        .discord:hover {
            background: #4752c4;
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(88, 101, 242, 0.45);
        }

        /* Instagram */
        .instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: #ffffff;
        }

        .instagram:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(220, 39, 67, 0.45);
            filter: brightness(1.15);
        }

        /* WhatsApp */
        .whatsapp {
            background: #25D366;
            color: #ffffff;
        }

        .whatsapp:hover {
            background: #20ba5a;
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.45);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #4e4e64;
            letter-spacing: 1px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area">
            <h1>EMERFFZ</h1>
            <p>Elige una plataforma para ingresar</p>
        </div>

        <div class="links-wrapper">
            <!-- Botón Discord -->
            <a href="https://discord.gg/Q2hmJMCVj" target="_blank" class="btn-link discord">
                Comunidad de Discord
            </a>

            <!-- Botón Instagram -->
            <a href="https://www.instagram.com/emerzn.xz7" target="_blank" class="btn-link instagram">
                Sígueme en Instagram
            </a>

            <!-- Botón WhatsApp -->
            <a href="https://chat.whatsapp.com/LugEhW5zTmt1GZm2YzCIM9" target="_blank" class="btn-link whatsapp">
                Grupo de WhatsApp
            </a>
        </div>

        <div class="footer">
            BY EMERFFZ • TODOS LOS DERECHOS RESERVADOS
        </div>
    </div>

</body>
</html>
